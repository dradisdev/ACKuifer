[build]
builder = "nixpacks"

[deploy]
startCommand = "python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[services.laserfiche-cron.deploy]
startCommand = "python -m app.scrapers.run_laserfiche"

[services.massdep-cron.deploy]
startCommand = "python -m app.scrapers.run_massdep"
