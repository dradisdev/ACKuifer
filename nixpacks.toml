# Playwright requires Chromium + OS-level dependencies at runtime.
# The 'chromium' phase runs after pip install and uses Playwright's
# own installer to fetch the correct Chromium build with all deps.

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["pip install -r requirements.txt --break-system-packages"]

[phases.chromium]
dependsOn = ["install"]
cmds = ["playwright install --with-deps chromium"]
