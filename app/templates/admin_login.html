<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACKuifer Admin — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1a1a1a; background: #f8f9fa; line-height: 1.6;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .login-box {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 2rem; width: 100%; max-width: 360px;
    }
    h1 { font-size: 1.3rem; color: #1a3a5c; margin-bottom: 0.3rem; }
    .subtitle { font-size: 0.85rem; color: #718096; margin-bottom: 1.5rem; }
    .error-msg {
      background: #FFF5F5; border: 1px solid #FED7D7; color: #C53030;
      padding: 0.5rem 0.8rem; border-radius: 4px; font-size: 0.85rem; margin-bottom: 1rem;
    }
    label { display: block; font-weight: 600; font-size: 0.85rem; color: #4a5568; margin-bottom: 0.3rem; }
    input[type="password"] {
      width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #cbd5e0;
      border-radius: 6px; font-size: 1rem; outline: none; margin-bottom: 1rem;
    }
    input:focus { border-color: #3182ce; box-shadow: 0 0 0 2px rgba(49,130,206,0.2); }
    button {
      width: 100%; padding: 0.65rem; background: #1a3a5c; color: #fff;
      border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #2c5282; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>ACKuifer Admin</h1>
    <p class="subtitle">Operator access only</p>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autofocus>
      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
